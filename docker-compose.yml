version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurosync-backend
    ports:
      - "8000:8000"
    volumes:
      - neurosync-data:/app/data
    environment:
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - DATASET_AUTO_SAVE=true
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/system/liveness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurosync-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neurosync-data:
    name: neurosync-data
